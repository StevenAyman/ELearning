services:
  elearning.api:
    image: ${DOCKER_REGISTRY-}elearningapi
    build:
      context: .
      dockerfile: src/ELearning.Api/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://elearning.aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
  
  elearning.aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: true
    ports:
      - 18888:18888

  elearning.sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_db
    ports:
     - 1433:1433
    environment:
     - ACCEPT_EULA=Y
     - MSSQL_SA_PASSWORD=P@ssw0rd
     - MSSQL_PID=Developer
    volumes:
     - mssql_data:/var/opt/mssql
    restart: always

  elearning.redis:
    image: redis:7.2-alpine
    container_name: redis_cache
    ports:
     - 6379:6379
    volumes:
     - redis_data:/data
    restart: always
    

volumes:
  mssql_data:
  redis_data:

